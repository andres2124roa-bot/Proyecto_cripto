<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargando</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

/* spinner */
.loader{
  border:6px solid #f3f3f3;
  border-top:6px solid #e30613;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}
.cargando-box{
  display:flex;
  align-items:center;   /* centra verticalmente */
  gap:15px;             /* espacio entre círculo y texto */
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="cargando-box">
  <div class="loader"></div>
  <h2>Cargando...</h2>
</div>

</body>
</html>
