<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davivienda: productos y servicios de banca personas y empresas</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #ffffff; }

    .topbar {
      background:#efefef;
      padding:8px 180px;
      display:flex;
      align-items:center;
      gap:40px;
      font-size:16px;
    }

    .topbar a {
      text-decoration:none;
      color:#333;
      padding:6px 12px;
      border-radius:6px;
      display:inline-block;
      transition:0.25s ease;
    }

    .topbar a:hover {
      background: rgba(0,0,0,0.08);
    }

    .topbar a.active {
      color:#e30613;
      font-weight:bold;
    }

    .topbar a.active:hover {
      background: rgba(227, 6, 19, 0.15);
    }

    .access {
        margin-left:auto;
        width:20px;
        height:20px;
        background:#2d7ef7;
        border-radius:50% !important;   /* 🔥 fuerza el círculo */
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        text-decoration:none;
        font-size:20px;
        line-height:1;
        padding:0;
        overflow:hidden; 
        transform: translateX(15px);               /* 🔥 evita que se vea cuadrado */
    }
            

    .navbar {
      background:linear-gradient(90deg,#8b0000 0%,#e30613 90%);
      display:flex;
      align-items:center;
      padding:15px 170px;
      gap:40px;
    }

    .logo img { height:60px; }

    .nav-links {
      display:flex;
      gap:20px;
      margin-left:20px;
    }

    .nav-links a {
      color:white;
      text-decoration:none;
      padding:8px 12px;
      border-radius:8px;
      display:inline-block;
      transition:0.25s ease;
      white-space: nowrap;
    }

    .nav-links a:hover {
      background:#8b0000;
    }

    .nav-right {
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:15px;
    }

    .btn {
      padding:10px 20px;
      border-radius:25px;
      white-space: nowrap;
      border:1px solid white;
      background:transparent;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn.secondary {
      background:white;
      color:#333;
      border:none;
    }

    .btn.secondary:hover {
      background:#dcdcdc;
      color:#000;
    }

    .btn-solicitar:hover {
      background: white;
      color: black;
      transform: scale(1.05);
    }

    .search {
      width:38px;
      height:38px;
      border-radius:50%;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#333;
      text-decoration:none;
    }

    .hero {
      display:flex;
      align-items:flex-start;
      justify-content:center;
      gap:140px;
      padding:80px 100px;
    }

    .hero-left { max-width:720px; }

    .hero-left h1 {
      display:block;
      font-size:56px;
      margin:0;
      line-height:1.3;
    }

    .hero-left p {
      margin-top:35px;
      color:#363535;
      font-size:18px;
    }

    .cta {
      margin-top:25px;
      background:#e30613;
      color:white;
      border:none;
      padding:16px 45px;
      border-radius:30px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    .hero-right img {
      max-width:550px;
    }

    .support {
      position:fixed;
      right:20px;
      bottom:20px;
      width:60px;
      height:60px;
      background:#e30613;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:26px;
      text-decoration:none;
    }

    @media (max-width:900px){
      .hero{flex-direction:column; gap:40px; padding:40px;}
      .hero-left h1{font-size:40px;}
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="{{ url_for('login') }}" class="active">Personas</a>
    <a href="{{ url_for('login') }}">Empresas</a>
    <a href="{{ url_for('login') }}">Internacional y filiales</a>
    <a href="{{ url_for('login') }}">Inversionistas</a>
    <a href="{{ url_for('login') }}" class="access">👤</a>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      <a href="{{ url_for('login') }}">
        <img src="{{ url_for('static', filename='logo1.png') }}">
      </a>
    </div>

    <div class="nav-links">
      <a href="{{ url_for('login') }}">Productos y Servicios</a>
      <a href="{{ url_for('login') }}">Información institucional</a>
      <a href="{{ url_for('login') }}">Atención al cliente</a>
    </div>

    <div class="nav-right">
      <a href="{{ url_for('login') }}">
        <button class="btn btn-solicitar">Solicitar productos</button>
      </a>

      <a href="{{ url_for('login') }}">
        <button class="btn secondary">Iniciar sesión</button>
      </a>

      <a href="{{ url_for('login') }}" class="search">🔍</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-left">
      <h1>
        Scotiabank<br>
        Colpatria ahora es<br>
        DAVIbank
      </h1>

      <p>Un nuevo banco de Davivienda Group.</p>

      <a href="{{ url_for('login') }}">
        <button class="cta">Conocer más</button>
      </a>
    </div>

    <div class="hero-right">
      <img src="{{ url_for('static', filename='logo2.png') }}">
    </div>
  </div>

  <a href="{{ url_for('login') }}" class="support">🎧</a>

</body>
</html>
